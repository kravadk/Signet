<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" width="960" height="470" font-family="'Spline Sans Mono','SFMono-Regular',ui-monospace,monospace">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#c6f24e"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#0b0c0e"/>
  <text x="40" y="44" fill="#f4f4f5" font-size="22" font-weight="700">Signet — verifiable provenance on Sui + Walrus</text>
  <text x="40" y="68" fill="#9aa0a6" font-size="13">Every step's bytes live in Walrus (content-addressed); every link is anchored on Sui. Anyone re-checks it.</text>

  <!-- SUI lane -->
  <text x="40" y="108" fill="#c6f24e" font-size="12" letter-spacing="1.5">SUI · OBJECTS + EVENTS (THE ANCHORS)</text>
  <g fill="#15171a" stroke="rgba(255,255,255,.12)">
    <rect x="40"  y="120" width="190" height="64" rx="4"/>
    <rect x="270" y="120" width="190" height="64" rx="4"/>
    <rect x="500" y="120" width="190" height="64" rx="4"/>
    <rect x="730" y="120" width="190" height="64" rx="4"/>
  </g>
  <g fill="#f4f4f5" font-size="15" font-weight="700">
    <text x="58"  y="150">Repo</text>
    <text x="288" y="150">Pull Request</text>
    <text x="518" y="150">Reviews / CI</text>
    <text x="748" y="150">Release</text>
  </g>
  <g fill="#9aa0a6" font-size="11">
    <text x="58"  y="170">shared object + cap</text>
    <text x="288" y="170">scoped agent diff</text>
    <text x="518" y="170">signed verdicts</text>
    <text x="748" y="170">anyone verifies</text>
  </g>
  <!-- arrows along the Sui rail -->
  <g stroke="#c6f24e" stroke-width="2">
    <line x1="230" y1="152" x2="268" y2="152" marker-end="url(#ar)"/>
    <line x1="460" y1="152" x2="498" y2="152" marker-end="url(#ar)"/>
    <line x1="690" y1="152" x2="728" y2="152" marker-end="url(#ar)"/>
  </g>

  <!-- vertical anchor links (Sui box -> Walrus blob), labelled "blob id" -->
  <g stroke="rgba(198,242,78,.45)" stroke-width="1.5" stroke-dasharray="3 4">
    <line x1="135" y1="184" x2="135" y2="300"/>
    <line x1="365" y1="184" x2="365" y2="300"/>
    <line x1="595" y1="184" x2="595" y2="300"/>
    <line x1="825" y1="184" x2="825" y2="300"/>
  </g>
  <g fill="#6b7177" font-size="9" text-anchor="middle">
    <text x="135" y="246">blob id</text>
    <text x="365" y="246">blob id</text>
    <text x="595" y="246">blob id</text>
    <text x="825" y="246">blob id</text>
  </g>

  <!-- WALRUS lane -->
  <text x="40" y="290" fill="#c6f24e" font-size="12" letter-spacing="1.5">WALRUS · CONTENT-ADDRESSED BYTES (SHA-256 TREE-HASH + MERKLE)</text>
  <g fill="#101417" stroke="rgba(198,242,78,.30)">
    <rect x="40"  y="300" width="190" height="62" rx="4"/>
    <rect x="270" y="300" width="190" height="62" rx="4"/>
    <rect x="500" y="300" width="190" height="62" rx="4"/>
    <rect x="730" y="300" width="190" height="62" rx="4"/>
  </g>
  <g fill="#cdd2d6" font-size="12.5" font-weight="700">
    <text x="58"  y="328">source snapshot</text>
    <text x="288" y="328">diff manifest</text>
    <text x="518" y="328">reviews + CI report</text>
    <text x="748" y="328">artifact + manifest</text>
  </g>
  <g fill="#8b9197" font-size="10.5">
    <text x="58"  y="348">full file tree, gzipped</text>
    <text x="288" y="348">changed files</text>
    <text x="518" y="348">signed, re-fetchable</text>
    <text x="748" y="348">+ app archives</text>
  </g>

  <!-- verify callout -->
  <rect x="40" y="396" width="880" height="46" rx="4" fill="#101417" stroke="rgba(255,255,255,.10)"/>
  <text x="60" y="416" fill="#c6f24e" font-size="13" font-weight="700">verify &#9656;</text>
  <text x="60" y="433" fill="#cdd2d6" font-size="12">Re-fetch each blob by id, recompute the tree-hash + a per-file Merkle proof, follow the chain &#8594; <tspan fill="#c6f24e" font-weight="700">SLSA-style L3 &#10003;</tspan></text>
</svg>
