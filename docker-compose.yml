# Signet — full stack (5 services + static web). `docker compose up --build`.
# Secrets come from a gitignored .env (see .env.example). Browser-reachable URLs
# in `web` use localhost:PORT (the browser calls them, not the web container);
# portal's SERVICES uses internal compose names (server-to-server health fan-out).
services:
  llm-proxy:
    build: { context: ./server/llm-proxy }
    ports: ["8787:8787"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ALLOWED_ORIGIN: ${WEB_ORIGIN:-*}
      RATE_LIMIT_PER_MIN: ${LLM_RATE_LIMIT_PER_MIN:-20}
    restart: unless-stopped

  sponsor:
    build: { context: ./server/sponsor }
    ports: ["8788:8788"]
    environment:
      SPONSOR_PRIVATE_KEY: ${SPONSOR_PRIVATE_KEY:-}
      ALLOWED_PACKAGES: ${ALLOWED_PACKAGES:-}
      SUI_NETWORK: ${SUI_NETWORK:-testnet}
      ALLOWED_ORIGIN: ${WEB_ORIGIN:-*}
      GAS_BUDGET: ${GAS_BUDGET:-20000000}
    restart: unless-stopped

  salt:
    build: { context: ./server/salt }
    ports: ["8789:8789"]
    environment:
      SALT_SECRET: ${SALT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOWED_ORIGIN: ${WEB_ORIGIN:-*}
    restart: unless-stopped

  portal:
    build: { context: ., dockerfile: server/portal/Dockerfile }
    ports: ["8790:8790"]
    environment:
      PUBLIC_ORIGIN: ${PORTAL_ORIGIN:-http://localhost:8790}
      SERVICES: "llm-proxy=http://llm-proxy:8787,sponsor=http://sponsor:8788,salt=http://salt:8789,indexer=http://indexer:4318/api"
    restart: unless-stopped

  indexer:
    build: { context: ., dockerfile: server/Dockerfile.indexer }
    ports: ["4318:4318"]
    environment:
      SUI_NETWORK: ${SUI_NETWORK:-testnet}
    # The SQLite cache is rebuildable from chain on each start, so no volume is needed.
    restart: unless-stopped

  web:
    build: { context: ./web }
    ports: ["8080:8080"]
    environment:
      WF_SPONSOR_URL: ${WF_SPONSOR_URL:-http://localhost:8788/sponsor}
      WF_PORTAL_URL: ${WF_PORTAL_URL:-http://localhost:8790}
      WF_LLM_PROXY_URL: ${WF_LLM_PROXY_URL:-http://localhost:8787/llm}
      WF_ZK_SALT_URL: ${WF_ZK_SALT_URL:-http://localhost:8789/salt}
      WF_ZK_PROVER_URL: ${WF_ZK_PROVER_URL:-}
      WF_ZK_GOOGLE_CLIENT_ID: ${WF_ZK_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
