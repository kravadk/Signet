version: 2
updates:
  - package-ecosystem: npm
    directory: "/app"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: "/server"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: "/server/sponsor"
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
  - package-ecosystem: npm
    directory: "/server/portal"
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
  - package-ecosystem: npm
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
